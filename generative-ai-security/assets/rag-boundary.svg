<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="RAG 與 Agent 安全邊界設計">
  <rect width="1200" height="720" fill="#fbfcf8"/>
  <text x="70" y="95" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="40" font-weight="700" fill="#203020">RAG 與 Agent 安全邊界</text>
  <text x="70" y="135" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="21" fill="#566456">把不可信輸入、模型推理與高風險動作拆開控管。</text>
  <g font-family="Arial, 'Microsoft JhengHei', sans-serif">
    <rect x="70" y="210" width="210" height="110" rx="16" fill="#fff1f2" stroke="#fb7185" stroke-width="3"/>
    <text x="175" y="255" text-anchor="middle" font-size="23" font-weight="700" fill="#881337">不可信內容</text>
    <text x="175" y="288" text-anchor="middle" font-size="16" fill="#881337">使用者輸入 / 外部網頁 / 文件</text>
    <rect x="360" y="200" width="240" height="130" rx="16" fill="#eff6ff" stroke="#60a5fa" stroke-width="3"/>
    <text x="480" y="248" text-anchor="middle" font-size="23" font-weight="700" fill="#1e3a8a">檢索與清洗</text>
    <text x="480" y="282" text-anchor="middle" font-size="16" fill="#1e3a8a">來源評分 / 分類 / 去除指令</text>
    <rect x="690" y="200" width="220" height="130" rx="16" fill="#f5f3ff" stroke="#a78bfa" stroke-width="3"/>
    <text x="800" y="248" text-anchor="middle" font-size="23" font-weight="700" fill="#4c1d95">模型回應</text>
    <text x="800" y="282" text-anchor="middle" font-size="16" fill="#4c1d95">引用根據 / 拒答 / 不執行指令</text>
    <rect x="990" y="210" width="150" height="110" rx="16" fill="#ecfdf5" stroke="#34d399" stroke-width="3"/>
    <text x="1065" y="255" text-anchor="middle" font-size="23" font-weight="700" fill="#065f46">使用者</text>
    <text x="1065" y="288" text-anchor="middle" font-size="16" fill="#065f46">確認與決策</text>
    <g fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow2)">
      <path d="M280 265 L360 265"/>
      <path d="M600 265 L690 265"/>
      <path d="M910 265 L990 265"/>
    </g>
    <rect x="360" y="470" width="240" height="120" rx="16" fill="#fff7ed" stroke="#fb923c" stroke-width="3"/>
    <text x="480" y="518" text-anchor="middle" font-size="23" font-weight="700" fill="#7c2d12">Policy Gate</text>
    <text x="480" y="552" text-anchor="middle" font-size="16" fill="#7c2d12">權限、資料等級、動作風險</text>
    <rect x="690" y="470" width="220" height="120" rx="16" fill="#f8fafc" stroke="#94a3b8" stroke-width="3"/>
    <text x="800" y="518" text-anchor="middle" font-size="23" font-weight="700" fill="#334155">工具執行</text>
    <text x="800" y="552" text-anchor="middle" font-size="16" fill="#334155">最小權限 / 審批 / 稽核紀錄</text>
    <g fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow2)">
      <path d="M800 330 C790 390 700 420 600 500"/>
      <path d="M600 530 L690 530"/>
    </g>
    <line x1="640" y1="170" x2="640" y2="620" stroke="#ef4444" stroke-width="4" stroke-dasharray="14 10"/>
    <text x="650" y="630" font-size="18" fill="#991b1b">信任邊界：模型輸出不能直接等於授權動作</text>
  </g>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
