quotes:
  opening:
    text: "生成式 AI 的最大風險，不是模型會不會回答錯，而是它被接到資料、工具與流程之後，錯誤會被自動放大。"
  closing:
    text: >
      安全導入生成式 AI 的核心不是禁止使用，而是讓每一次模型輸出、工具呼叫與資料取用都能被限制、驗證、記錄與回復。

