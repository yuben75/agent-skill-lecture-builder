page:
  title: "Node VISA Test Runner Platform：自動化儀器測試平台規劃"
  badge: "Lecture | Test Automation"
  hero_title: "Node VISA<br>Test Runner Platform"
  subtitle: "從 Node.js、Python/pyVISA、NI-VISA、SCPI、Binary 通訊到 Local Runner，規劃可版本化、可追溯、可落地的 Client/Server 自動化測試平台。"

quotes:
  opening:
    text: "儀器控制的關鍵不是送出命令，<br>而是把命令、流程、版本與報告整理成可治理的平台。"
  closing:
    text: >
      先讓一台儀器、一個測試包、一份報告端到端跑通，<br>
      再擴充命令集、流程編輯器與版本治理。<br><br>
      這會比一開始追求完整平台更容易落地。

