<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">TLS Socket 程式架構圖</title>
  <desc id="desc">Application 透過 OpenSSL SSL object 進入 TLS layer，再由 socket fd 傳送到 TCP/IP。SSL_CTX 提供共用設定，callback 與 diagnostics 觀察握手與憑證驗證。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#059669"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 34px "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 22px "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 17px "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif; fill: #475569; }
      .tiny { font: 500 15px "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif; fill: #64748b; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .dark { fill: #dff7f2; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .soft { fill: #f8fafc; stroke: #dbe4ef; stroke-width: 2; rx: 14; }
      .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2.5; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="60" y="72" class="title">TLS Socket 程式架構圖</text>
  <text x="60" y="108" class="small">把 TCP socket 包進 OpenSSL 狀態機，並用 SSL_CTX 管理共用安全政策</text>

  <rect x="80" y="165" width="360" height="470" class="box"/>
  <text x="112" y="210" class="label">Application / Service</text>
  <rect x="115" y="245" width="290" height="72" class="soft"/>
  <text x="140" y="275" class="small">Protocol Parser</text>
  <text x="140" y="299" class="tiny">length-prefix / framing</text>
  <rect x="115" y="345" width="290" height="72" class="soft"/>
  <text x="140" y="375" class="small">TLS Wrapper</text>
  <text x="140" y="399" class="tiny">TlsConnection / error mapping</text>
  <rect x="115" y="445" width="290" height="72" class="soft"/>
  <text x="140" y="475" class="small">Diagnostics</text>
  <text x="140" y="499" class="tiny">verify log / info / keylog</text>

  <rect x="500" y="165" width="310" height="470" class="dark"/>
  <text x="535" y="210" class="label">OpenSSL TLS Layer</text>
  <rect x="535" y="245" width="240" height="86" fill="#ffffff" opacity="0.96" stroke="#cbd5e1" stroke-width="2" rx="14"/>
  <text x="560" y="277" class="small">SSL_CTX</text>
  <text x="560" y="302" class="tiny">cert / key / CA / policy</text>
  <rect x="535" y="365" width="240" height="86" fill="#ffffff" opacity="0.96" stroke="#cbd5e1" stroke-width="2" rx="14"/>
  <text x="560" y="397" class="small">SSL per connection</text>
  <text x="560" y="422" class="tiny">handshake / session / state</text>
  <rect x="535" y="485" width="240" height="86" fill="#ffffff" opacity="0.96" stroke="#cbd5e1" stroke-width="2" rx="14"/>
  <text x="560" y="517" class="small">BIO / socket binding</text>
  <text x="560" y="542" class="tiny">SSL_set_fd / SSL_set_bio</text>

  <rect x="870" y="165" width="250" height="470" class="box"/>
  <text x="910" y="210" class="label">Transport</text>
  <rect x="905" y="260" width="180" height="72" class="soft"/>
  <text x="940" y="290" class="small">socket fd</text>
  <text x="940" y="314" class="tiny">readiness / errno</text>
  <rect x="905" y="380" width="180" height="72" class="soft"/>
  <text x="950" y="410" class="small">TCP</text>
  <text x="930" y="434" class="tiny">reliable stream</text>
  <rect x="905" y="500" width="180" height="72" class="soft"/>
  <text x="956" y="530" class="small">IP</text>
  <text x="936" y="554" class="tiny">network path</text>

  <path d="M405 380 H520" class="line"/>
  <text x="420" y="360" class="tiny">SSL_read / SSL_write</text>
  <path d="M775 525 H905" class="line"/>
  <text x="792" y="505" class="tiny">encrypted records</text>
  <path d="M535 285 C455 255 418 450 405 480" class="dash"/>
  <text x="342" y="435" class="tiny">callbacks 回寫診斷資訊</text>

  <rect x="80" y="675" width="1040" height="44" fill="#ffffff" stroke="#dbe4ef" rx="12"/>
  <text x="110" y="703" class="small">設計重點：SSL_CTX 管安全政策，SSL 管單一連線，Application message framing 仍由應用層負責。</text>
</svg>
