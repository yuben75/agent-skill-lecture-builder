<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="生成式 AI 應用威脅地圖">
  <rect width="1200" height="720" fill="#f7f9fc"/>
  <rect x="70" y="70" width="1060" height="580" rx="22" fill="#ffffff" stroke="#d7dee8" stroke-width="3"/>
  <text x="100" y="130" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="42" font-weight="700" fill="#18324a">生成式 AI 應用威脅地圖</text>
  <text x="100" y="175" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="22" fill="#506175">攻擊者不只攻擊模型，也攻擊資料、工具、工作流與人員信任。</text>
  <g font-family="Arial, 'Microsoft JhengHei', sans-serif">
    <rect x="435" y="280" width="330" height="140" rx="18" fill="#14213d"/>
    <text x="600" y="340" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">LLM 應用</text>
    <text x="600" y="380" text-anchor="middle" font-size="18" fill="#cbd5e1">Prompt | RAG | Agent | API</text>
    <g fill="none" stroke="#516179" stroke-width="4" marker-end="url(#arrow)">
      <path d="M280 255 C350 280 380 310 435 330"/>
      <path d="M280 475 C350 450 380 405 435 385"/>
      <path d="M920 255 C850 280 820 310 765 330"/>
      <path d="M920 475 C850 450 820 405 765 385"/>
    </g>
    <g>
      <rect x="120" y="210" width="220" height="92" rx="14" fill="#ffe8d6" stroke="#f4a261" stroke-width="2"/>
      <text x="230" y="250" text-anchor="middle" font-size="22" font-weight="700" fill="#7c2d12">提示注入</text>
      <text x="230" y="278" text-anchor="middle" font-size="15" fill="#7c2d12">藏在網頁、文件、客服訊息</text>
      <rect x="120" y="430" width="220" height="92" rx="14" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
      <text x="230" y="470" text-anchor="middle" font-size="22" font-weight="700" fill="#075985">敏感資料外洩</text>
      <text x="230" y="498" text-anchor="middle" font-size="15" fill="#075985">PII、商業機密、憑證</text>
      <rect x="860" y="210" width="220" height="92" rx="14" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
      <text x="970" y="250" text-anchor="middle" font-size="22" font-weight="700" fill="#4c1d95">工具濫用</text>
      <text x="970" y="278" text-anchor="middle" font-size="15" fill="#4c1d95">寄信、下單、刪檔、查庫</text>
      <rect x="860" y="430" width="220" height="92" rx="14" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
      <text x="970" y="470" text-anchor="middle" font-size="22" font-weight="700" fill="#14532d">RAG 汙染</text>
      <text x="970" y="498" text-anchor="middle" font-size="15" fill="#14532d">假知識、過期文件、惡意頁面</text>
    </g>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#516179"/>
    </marker>
  </defs>
</svg>
